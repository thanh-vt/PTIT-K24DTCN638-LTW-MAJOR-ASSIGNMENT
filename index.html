<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang cá nhân</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="stylesheet" href="style/mini-games.css">
</head>
<body>

<app-header></app-header>

<!-- TRANG CHỦ -->
<section id="home" class="section">
  <h1>Developer demo blog - Vũ Tất Thành</h1>
  <p>Chào mừng đến với trang web cá nhân của tôi
  </p>
</section>

<section class="section">
  <h2>Project cá nhân - Mini Web Games</h2>

  <div class="game-layout">

    <!-- SIDEBAR -->
    <div class="game-list">
      <div class="game-item">
        <span>Racing Car</span>
        <button onclick="loadGame('https://racing-car-game.netlify.app/', this)">
          Chơi thử
        </button>
      </div>

      <div class="game-item">
        <span>Bouncing Ball</span>
        <button onclick="loadGame('https://bouncing-ball-game.netlify.app/', this)">
          Chơi thử
        </button>
      </div>

      <div class="game-item">
        <span>Whack The Mole</span>
        <button onclick="loadGame('https://whach-the-mole.netlify.app/', this)">
          Chơi thử
        </button>
      </div>
    </div>

    <!-- VIEWER -->
    <div class="game-viewer">
      <iframe id="gameFrame" src="" loading="lazy"></iframe>
    </div>

  </div>
</section>

<script src="script/script.js"></script>
</body>
</html>
